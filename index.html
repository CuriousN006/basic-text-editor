<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오프라인 리치 라이터</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f5;
      --panel: #ffffff;
      --line: #d7dce3;
      --text: #202124;
      --muted: #69707a;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #b42318;
      --shadow: 0 12px 40px rgba(32, 33, 36, .12);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    }

    button, select, input {
      font: inherit;
    }

    .topbar {
      flex: 0 0 auto;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 8px rgba(32, 33, 36, .06);
      z-index: 10;
    }

    .filebar,
    .formatbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 7px 12px;
    }

    .filebar {
      border-bottom: 1px solid #edf0f3;
    }

    .brand {
      margin-right: 8px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .toolbar-button,
    .toolbar-select {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
    }

    .toolbar-button {
      min-width: 36px;
      padding: 6px 9px;
      cursor: pointer;
    }

    .toolbar-button:hover,
    .toolbar-button:focus-visible,
    .toolbar-select:hover,
    .toolbar-select:focus-visible {
      border-color: var(--line);
      background: #f5f7fa;
      outline: none;
    }

    .toolbar-button:active {
      background: var(--accent-soft);
    }

    .toolbar-button.is-active,
    .toolbar-button[aria-pressed="true"] {
      border-color: #93c5fd;
      background: var(--accent-soft);
      color: var(--accent);
    }

    .toolbar-button.primary {
      background: var(--accent);
      color: white;
    }

    .toolbar-button.primary:hover,
    .toolbar-button.primary:focus-visible {
      background: #1d4ed8;
    }

    .toolbar-select {
      padding: 5px 28px 5px 9px;
      cursor: pointer;
    }

    .separator {
      width: 1px;
      height: 25px;
      margin: 0 2px;
      background: var(--line);
    }

    .workspace {
      flex: 1 1 auto;
      overflow: auto;
      padding: 28px 16px 80px;
    }

    .page {
      width: min(820px, 100%);
      min-height: 1050px;
      margin: 0 auto;
      padding: 72px 78px 110px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    #editor {
      min-height: 850px;
      outline: none;
      font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      tab-size: 4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #editor:empty::before {
      color: #9aa0a6;
      content: "여기에 글을 입력하거나 마크다운 파일을 여세요…";
      pointer-events: none;
    }

    #editor p {
      margin: 0 0 1em;
    }

    #editor p.blank-line {
      min-height: 1.75em;
      margin: 0;
    }

    #editor h1 { font-size: 2em; margin: 1.1em 0 .55em; }
    #editor h2 { font-size: 1.55em; margin: 1.15em 0 .55em; }
    #editor h3 { font-size: 1.25em; margin: 1.1em 0 .5em; }
    #editor ul, #editor ol { margin: .4em 0 1em; padding-left: 1.8em; }
    #editor blockquote {
      margin: 1em 0;
      padding: .5em 1em;
      border-left: 4px solid #94a3b8;
      background: #f8fafc;
      color: #475569;
    }
    #editor pre {
      overflow-x: auto;
      padding: 14px 16px;
      border-radius: 8px;
      background: #f4f5f7;
      font: 14px/1.55 Consolas, monospace;
    }
    #editor code {
      padding: .1em .3em;
      border-radius: 4px;
      background: #f1f3f4;
      font-family: Consolas, monospace;
    }
    #editor pre code { padding: 0; background: transparent; }
    #editor a { color: #1558d6; text-decoration: underline; }
    #editor hr { margin: 2em 0; border: 0; border-top: 1px solid #cdd2d9; }
    #editor img { max-width: 100%; height: auto; }

    .link-preview {
      display: none;
      position: fixed;
      max-width: min(520px, calc(100vw - 24px));
      padding: 9px 11px;
      border: 1px solid #c9d1dc;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 7px 24px rgba(32, 33, 36, .18);
      font-size: 12px;
      line-height: 1.45;
      pointer-events: auto;
      user-select: text;
      z-index: 40;
    }

    .link-preview.visible { display: block; }

    .link-preview::before {
      position: absolute;
      top: -14px;
      right: -10px;
      left: -10px;
      height: 14px;
      background: transparent;
      content: "";
    }

    .link-preview.above::before {
      top: auto;
      bottom: -14px;
    }

    .link-preview-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .link-preview-url {
      display: block;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      color: #1558d6;
      font-weight: 600;
      text-overflow: ellipsis;
      text-decoration: underline;
      white-space: nowrap;
    }

    .link-preview-copy {
      flex: none;
      padding: 3px 7px;
      border: 1px solid #c9d1dc;
      border-radius: 5px;
      background: #f8fafc;
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }

    .link-preview-copy:hover,
    .link-preview-copy:focus-visible {
      border-color: #93c5fd;
      background: var(--accent-soft);
      outline: none;
    }

    .link-preview-hint {
      display: block;
      margin-top: 2px;
      color: var(--muted);
    }

    .selection-toolbar {
      display: none;
      position: fixed;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border: 1px solid #c9d1dc;
      border-radius: 9px;
      background: #ffffff;
      box-shadow: 0 7px 24px rgba(32, 33, 36, .18);
      z-index: 35;
    }

    .selection-toolbar.visible { display: flex; }

    .mini-format-button {
      min-width: 30px;
      min-height: 30px;
      padding: 4px 7px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    .mini-format-button:hover,
    .mini-format-button:focus-visible,
    .mini-format-button[aria-pressed="true"] {
      border-color: #93c5fd;
      background: var(--accent-soft);
      color: var(--accent);
      outline: none;
    }

    .findbar {
      display: none;
      position: fixed;
      top: 104px;
      right: 22px;
      width: min(460px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 20;
    }

    .findbar.open { display: block; }

    .find-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 7px;
    }

    .find-row:last-child { margin-bottom: 0; }

    .find-input {
      width: 100%;
      min-height: 34px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      outline: none;
    }

    .find-input:focus { border-color: var(--accent); }

    .particle-option {
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 34px;
      padding: 0 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .particle-option input {
      margin: 0;
      accent-color: var(--accent);
    }

    .find-specials {
      margin: 1px 0 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .find-specials code {
      color: var(--text);
      font-family: Consolas, monospace;
    }

    .replace-formats {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .replace-formats-label { margin-right: 2px; }

    .find-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .statusbar {
      position: fixed;
      right: 16px;
      bottom: 12px;
      display: flex;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid rgba(215, 220, 227, .8);
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: var(--muted);
      font-size: 12px;
      box-shadow: 0 4px 18px rgba(32, 33, 36, .08);
      backdrop-filter: blur(8px);
      z-index: 12;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translate(-50%, 20px);
      padding: 10px 15px;
      border-radius: 8px;
      background: #202124;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      .brand { width: 100%; }
      .workspace { padding: 0 0 70px; }
      .page {
        min-height: 100%;
        padding: 40px 24px 90px;
        box-shadow: none;
      }
      .findbar { top: 150px; }
    }

    @media print {
      body { display: block; overflow: visible; background: white; }
      .topbar, .findbar, .selection-toolbar, .statusbar, .toast { display: none !important; }
      .workspace { overflow: visible; padding: 0; }
      .page { width: auto; min-height: auto; padding: 0; box-shadow: none; }
      #editor { min-height: auto; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="filebar">
      <span class="brand">오프라인 리치 라이터</span>
      <button class="toolbar-button" type="button" data-action="new" title="새 문서">새 문서</button>
      <button class="toolbar-button" type="button" data-action="open" title="마크다운·HTML·텍스트 열기">파일 열기</button>
      <button class="toolbar-button" type="button" data-action="save-html" title="HTML로 저장 (Ctrl+S)">HTML 저장</button>
      <button class="toolbar-button" type="button" data-action="save-md" title="마크다운으로 저장">MD 저장</button>
      <button class="toolbar-button" type="button" data-action="save-docx" title="Microsoft Word 문서로 저장">DOCX 저장</button>
      <span class="separator" aria-hidden="true"></span>
      <button class="toolbar-button primary" type="button" data-action="copy-all" title="문서 전체를 서식 있게 복사">전체 서식 복사</button>
      <button class="toolbar-button" type="button" data-action="print" title="인쇄 또는 PDF 저장">인쇄</button>
      <input id="fileInput" class="sr-only" type="file" accept=".md,.markdown,.txt,.html,.htm,text/markdown,text/plain,text/html">
    </div>
    <div class="formatbar" aria-label="서식 도구">
      <button class="toolbar-button" type="button" data-command="undo" title="실행 취소 (Ctrl+Z)">↶</button>
      <button class="toolbar-button" type="button" data-command="redo" title="다시 실행 (Ctrl+Y)">↷</button>
      <span class="separator" aria-hidden="true"></span>
      <select id="blockFormat" class="toolbar-select" title="문단 종류">
        <option value="P">본문</option>
        <option value="H1">제목 1</option>
        <option value="H2">제목 2</option>
        <option value="H3">제목 3</option>
        <option value="BLOCKQUOTE">인용문</option>
        <option value="PRE">코드 블록</option>
      </select>
      <button class="toolbar-button" type="button" data-command="bold" aria-pressed="false" title="굵게 (Ctrl+B)"><b>B</b></button>
      <button class="toolbar-button" type="button" data-command="italic" aria-pressed="false" title="기울임 (Ctrl+I)"><i>I</i></button>
      <button class="toolbar-button" type="button" data-command="underline" aria-pressed="false" title="밑줄 (Ctrl+U)"><u>U</u></button>
      <button class="toolbar-button" type="button" data-command="strikeThrough" aria-pressed="false" title="취소선"><s>S</s></button>
      <span class="separator" aria-hidden="true"></span>
      <button class="toolbar-button" type="button" data-command="insertUnorderedList" aria-pressed="false" title="글머리 기호 목록">• 목록</button>
      <button class="toolbar-button" type="button" data-command="insertOrderedList" aria-pressed="false" title="번호 목록">1. 목록</button>
      <button class="toolbar-button" type="button" data-action="link" title="하이퍼링크 (Ctrl+K)">🔗</button>
      <button class="toolbar-button" type="button" data-command="unlink" title="링크 제거">링크 해제</button>
      <button class="toolbar-button" type="button" data-action="clear-format" title="글자 및 문단 서식 제거">서식 제거</button>
      <button class="toolbar-button" type="button" data-command="insertHorizontalRule" title="구분선">―</button>
      <span class="separator" aria-hidden="true"></span>
      <button class="toolbar-button" type="button" data-action="find" title="찾기 (Ctrl+F)">찾기</button>
      <button class="toolbar-button" type="button" data-action="replace" title="찾아 바꾸기 (Ctrl+H)">바꾸기</button>
    </div>
  </header>

  <main class="workspace">
    <article class="page">
      <div id="editor" contenteditable="true" spellcheck="true" aria-label="문서 편집 영역"><p><br></p></div>
    </article>
  </main>

  <section id="findbar" class="findbar" aria-label="찾기 및 바꾸기">
    <div class="find-row">
      <input id="findText" class="find-input" type="text" placeholder="찾을 내용" autocomplete="off">
      <button class="toolbar-button" type="button" data-find="close" title="닫기">✕</button>
    </div>
    <div id="replaceRow" class="find-row">
      <input id="replaceText" class="find-input" type="text" placeholder="바꿀 내용" autocomplete="off">
      <label class="particle-option" title="바꾼 단어의 받침에 맞춰 바로 뒤의 조사를 교정합니다.">
        <input id="adjustParticles" type="checkbox" checked>
        조사 자동 교정
      </label>
    </div>
    <div id="replaceFormats" class="replace-formats" aria-label="바꿀 내용 서식">
      <span class="replace-formats-label">바꿀 서식</span>
      <button class="mini-format-button" type="button" data-replace-format="bold" aria-pressed="false" title="바꿀 내용을 굵게"><b>B</b></button>
      <button class="mini-format-button" type="button" data-replace-format="italic" aria-pressed="false" title="바꿀 내용을 기울임"><i>I</i></button>
      <button class="mini-format-button" type="button" data-replace-format="underline" aria-pressed="false" title="바꿀 내용에 밑줄"><u>U</u></button>
      <button class="mini-format-button" type="button" data-replace-format="strikeThrough" aria-pressed="false" title="바꿀 내용에 취소선"><s>S</s></button>
    </div>
    <div id="replaceFormatHint" class="find-specials">켜진 버튼의 서식은 적용하고 꺼진 버튼의 서식은 제거합니다. 바꿀 내용을 비우면 글자는 유지하고 서식만 변경합니다.</div>
    <div class="find-specials">
      특수기호: <code>^p</code> 문단 · <code>^l</code> 줄바꿈 · <code>^t</code> 탭 · <code>^^</code> ^ 문자
    </div>
    <div class="find-actions">
      <button class="toolbar-button" type="button" data-find="next">다음 찾기</button>
      <button class="toolbar-button" type="button" data-find="replace">바꾸기</button>
      <button class="toolbar-button" type="button" data-find="replace-all">모두 바꾸기</button>
    </div>
  </section>

  <div class="statusbar" aria-live="polite">
    <span id="fileName">새 문서</span>
    <span id="count">0자 · 0단어</span>
  </div>
  <div id="linkPreview" class="link-preview" role="dialog" aria-label="링크 정보">
    <div class="link-preview-main">
      <a id="linkPreviewUrl" class="link-preview-url" target="_blank" rel="noopener noreferrer"></a>
      <button id="linkPreviewCopy" class="link-preview-copy" type="button">주소 복사</button>
    </div>
    <span class="link-preview-hint">링크 열기 또는 주소 복사</span>
  </div>
  <div id="selectionToolbar" class="selection-toolbar" role="toolbar" aria-label="선택한 글자 빠른 서식">
    <button class="mini-format-button" type="button" data-selection-command="bold" aria-pressed="false" title="굵게 (Ctrl+B)"><b>B</b></button>
    <button class="mini-format-button" type="button" data-selection-command="italic" aria-pressed="false" title="기울임 (Ctrl+I)"><i>I</i></button>
    <button class="mini-format-button" type="button" data-selection-command="underline" aria-pressed="false" title="밑줄 (Ctrl+U)"><u>U</u></button>
    <button class="mini-format-button" type="button" data-selection-command="strikeThrough" aria-pressed="false" title="취소선"><s>S</s></button>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      'use strict';

      const editor = document.getElementById('editor');
      const fileInput = document.getElementById('fileInput');
      const fileNameLabel = document.getElementById('fileName');
      const countLabel = document.getElementById('count');
      const toast = document.getElementById('toast');
      const findbar = document.getElementById('findbar');
      const findText = document.getElementById('findText');
      const replaceText = document.getElementById('replaceText');
      const replaceRow = document.getElementById('replaceRow');
      const replaceFormats = document.getElementById('replaceFormats');
      const replaceFormatButtons = [...document.querySelectorAll('[data-replace-format]')];
      const replaceFormatHint = document.getElementById('replaceFormatHint');
      const adjustParticles = document.getElementById('adjustParticles');
      const blockFormat = document.getElementById('blockFormat');
      const statefulCommandButtons = [...document.querySelectorAll('[data-command][aria-pressed]')];
      const supportedBlockFormats = new Set(['P', 'H1', 'H2', 'H3', 'BLOCKQUOTE', 'PRE']);
      const selectionToolbar = document.getElementById('selectionToolbar');
      const selectionCommandButtons = [...document.querySelectorAll('[data-selection-command]')];
      const linkPreview = document.getElementById('linkPreview');
      const linkPreviewUrl = document.getElementById('linkPreviewUrl');
      const linkPreviewCopy = document.getElementById('linkPreviewCopy');
      let currentFileName = '새 문서';
      let currentHtmlFileHandle = null;
      let currentMarkdownFileHandle = null;
      let currentDocxFileHandle = null;
      let toastTimer = null;
      let savedRange = null;
      let hoveredLink = null;
      let specialSearchState = { query: '', nextIndex: 0, index: -1, range: null };
      let pastePlainRequested = false;

      const showToast = (message) => {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      };

      const updateCount = () => {
        const text = editor.innerText.replace(/\u200B/g, '').trim();
        const characters = text.length;
        const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
        countLabel.textContent = `${characters.toLocaleString()}자 · ${words.toLocaleString()}단어`;
        fileNameLabel.textContent = currentFileName;
      };

      const focusEditor = () => {
        editor.focus({ preventScroll: true });
      };

      const runCommand = (command, value = null) => {
        focusEditor();
        document.execCommand(command, false, value);
        updateCount();
        updateFormattingControlsState();
      };

      const selectionIsInsideEditor = () => {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) return false;
        const node = selection.getRangeAt(0).commonAncestorContainer;
        return node === editor || editor.contains(node.nodeType === Node.TEXT_NODE ? node.parentNode : node);
      };

      const updateFormattingControlsState = () => {
        const selectionInside = selectionIsInsideEditor();
        statefulCommandButtons.forEach((button) => {
          let isActive = false;
          if (selectionInside) {
            try {
              isActive = document.queryCommandState(button.dataset.command);
            } catch (error) {
              isActive = false;
            }
          }
          button.classList.toggle('is-active', isActive);
          button.setAttribute('aria-pressed', String(isActive));
        });

        if (!selectionInside) return;
        let currentBlock = 'P';
        try {
          currentBlock = String(document.queryCommandValue('formatBlock') || 'P')
            .replace(/[<>]/g, '')
            .toUpperCase();
        } catch (error) {
          currentBlock = 'P';
        }
        if (currentBlock === 'DIV') currentBlock = 'P';
        blockFormat.value = supportedBlockFormats.has(currentBlock) ? currentBlock : 'P';
      };

      const hideSelectionToolbar = () => {
        selectionToolbar.classList.remove('visible');
      };

      const updateSelectionToolbarState = () => {
        selectionCommandButtons.forEach((button) => {
          let isActive = false;
          try {
            isActive = document.queryCommandState(button.dataset.selectionCommand);
          } catch (error) {
            isActive = false;
          }

      const showSelectionToolbar = () => {

          || !selection.rangeCount
          || !selectionIsInsideEditor()
          || findbar.contains(document.activeElement)) {
          hideSelectionToolbar();
          return;
        }

        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        if (!rect.width && !rect.height) {
          hideSelectionToolbar();
          return;
        }

        savedRange = range.cloneRange();
        updateSelectionToolbarState();
        selectionToolbar.classList.add('visible');
        const toolbarRect = selectionToolbar.getBoundingClientRect();
        const left = Math.min(
          Math.max(8, rect.left + (rect.width - toolbarRect.width) / 2),
          window.innerWidth - toolbarRect.width - 8
        );
        const preferredTop = rect.top - toolbarRect.height - 8;
        const top = preferredTop >= 8 ? preferredTop : Math.min(window.innerHeight - toolbarRect.height - 8, rect.bottom + 8);
        selectionToolbar.style.left = `${left}px`;
        selectionToolbar.style.top = `${top}px`;
      };

      const saveSelection = () => {
        const selection = window.getSelection();
        if (selection && selection.rangeCount && selectionIsInsideEditor()) {
          savedRange = selection.getRangeAt(0).cloneRange();
        }
      };

      const restoreSelection = () => {
        if (!savedRange) return;
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(savedRange);

        selection.removeAllRanges();
        selection.addRange(range);
        savedRange = range.cloneRange();

      const normalizeEmptyDocument = (force = false) => {

        if (!force && (text || hasNonTextContent)) return false;

        const first = editor.firstElementChild;
        const alreadyNormal = editor.childElementCount === 1
          && first?.tagName === 'P'
          && !first.textContent.replace(/\u200B/g, '').trim()
          && !first.querySelector('img, hr, table, iframe, video, audio, canvas, svg');

        normalizeEmptyDocument();

      const unwrapElement = (element) => {

      const removeFormatsFromDocument = (formats) => {

          italic: 'i,em',
          underline: 'u',
          strikeThrough: 's,strike,del'

        const affected = new Set();

        formats.forEach((format) => {
          editor.querySelectorAll(selectors[format]).forEach((element) => {
            affected.add(element);
            unwrapElement(element);

        editor.querySelectorAll('[style]').forEach((element) => {
          let changed = false;
          if (formats.includes('bold') && element.style.fontWeight) {
            element.style.fontWeight = '';

          }
          if (formats.includes('italic') && element.style.fontStyle) {
            element.style.fontStyle = '';
            changed = true;
          }
          const removedDecorations = [];
          if (formats.includes('underline')) removedDecorations.push('underline');
          if (formats.includes('strikeThrough')) removedDecorations.push('line-through');

            const decoration = String(element.style.textDecorationLine || element.style.textDecoration || '');

              changed = true;
            }

          if (changed) affected.add(element);

        normalizeEmptyDocument();
        updateCount();
        updateFormattingControlsState();
        return affected.size;

      const applyFormatSettingsToDocument = (settings) => {

      const sanitizeHtml = (html) => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        doc.querySelectorAll('script, style, iframe, object, embed, link, meta').forEach((node) => node.remove());
        doc.querySelectorAll('*').forEach((node) => {
          [...node.attributes].forEach((attribute) => {
            const name = attribute.name.toLowerCase();
            const value = attribute.value.trim().toLowerCase();
            if (name.startsWith('on') || ((name === 'href' || name === 'src') && value.startsWith('javascript:'))) {
              node.removeAttribute(attribute.name);

      const parseInlineMarkdown = (source) => {
        const codeTokens = [];
        let value = String(source).replace(/`([^`]+)`/g, (_, code) => {
          const token = `\u0000CODE${codeTokens.length}\u0000`;
          codeTokens.push(`<code>${escapeHtml(code)}</code>`);
          return token;
        });
        value = escapeHtml(value);
        value = value
          .replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1">')
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2">$1</a>')
          .replace(/&lt;(https?:\/\/[^&]+)&gt;/g, '<a href="$1">$1</a>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/__([^_]+)__/g, '<strong>$1</strong>')
          .replace(/~~([^~]+)~~/g, '<s>$1</s>')
          .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>')
          .replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>')
          .replace(/  $/, '<br>');
        codeTokens.forEach((html, index) => {
          value = value.replace(`\u0000CODE${index}\u0000`, html);
        });
        return value;
      };

      const markdownToHtml = (markdown) => {
        const lines = String(markdown).replace(/\r\n?/g, '\n').split('\n');
        const output = [];
        let paragraph = [];
        let listType = null;
        let inCode = false;
        let codeLines = [];
        let pendingBlankLines = 0;

        const flushParagraph = () => {
          if (!paragraph.length) return;
          output.push(`<p>${paragraph.map(parseInlineMarkdown).join('<br>')}</p>`);
          paragraph = [];
        };

        const closeList = () => {
          if (!listType) return;
          output.push(`</${listType}>`);
          listType = null;
        };

        const emitBlanks = () => {
          for (let i = 0; i < pendingBlankLines; i += 1) {
            output.push('<p class="blank-line"><br></p>');
          }
          pendingBlankLines = 0;
        };

        lines.forEach((line) => {
          if (/^```/.test(line)) {
            flushParagraph();
            closeList();
            if (inCode) {
              output.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
              codeLines = [];
              inCode = false;
            } else {
              emitBlanks();
              inCode = true;
            }
            return;
          }

          if (inCode) {
            codeLines.push(line);
            return;
          }

          if (!line.trim()) {
            flushParagraph();
            closeList();
            pendingBlankLines += 1;
            return;
          }

          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          const unordered = line.match(/^\s*[-+*]\s+(?:\[([ xX])\]\s+)?(.+)$/);
          const ordered = line.match(/^\s*\d+[.)]\s+(.+)$/);
          const quote = line.match(/^>\s?(.*)$/);

          flushParagraph();
          emitBlanks();

          if (heading) {
            closeList();
            const level = heading[1].length;
            output.push(`<h${level}>${parseInlineMarkdown(heading[2])}</h${level}>`);
          } else if (/^\s*(---+|___+|\*\*\*+)\s*$/.test(line)) {
            closeList();
            output.push('<hr>');
          } else if (unordered) {
            if (listType !== 'ul') {
              closeList();
              listType = 'ul';
              output.push('<ul>');
            }
            const checked = unordered[1] ? `<input type="checkbox" disabled${unordered[1].toLowerCase() === 'x' ? ' checked' : ''}> ` : '';
            output.push(`<li>${checked}${parseInlineMarkdown(unordered[2])}</li>`);
          } else if (ordered) {
            if (listType !== 'ol') {
              closeList();
              listType = 'ol';
              output.push('<ol>');
            }
            output.push(`<li>${parseInlineMarkdown(ordered[1])}</li>`);
          } else if (quote) {
            closeList();
            output.push(`<blockquote>${parseInlineMarkdown(quote[1])}</blockquote>`);
          } else {
            closeList();
            paragraph.push(line);
          }
        });

        if (inCode) output.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
        flushParagraph();
        closeList();
        emitBlanks();
        return output.join('');
      };

      const inlineHtmlToMarkdown = (node) => {
        if (node.nodeType === Node.TEXT_NODE) return node.nodeValue || '';
        if (node.nodeType !== Node.ELEMENT_NODE) return '';
        const children = [...node.childNodes].map(inlineHtmlToMarkdown).join('');
        const tag = node.tagName.toLowerCase();
        if (tag === 'strong' || tag === 'b') return `**${children}**`;
        if (tag === 'em' || tag === 'i') return `*${children}*`;
        if (tag === 's' || tag === 'strike' || tag === 'del') return `~~${children}~~`;
        if (tag === 'u') return `<u>${children}</u>`;
        if (tag === 'code' && node.parentElement?.tagName.toLowerCase() !== 'pre') return `\`${children}\``;
        if (tag === 'a') return `[${children}](${node.getAttribute('href') || ''})`;
        if (tag === 'img') return `![${node.getAttribute('alt') || ''}](${node.getAttribute('src') || ''})`;
        if (tag === 'br') return '\n';
        return children;
      };

      const htmlToMarkdown = () => {
        const convertBlock = (node, depth = 0) => {
          if (node.nodeType === Node.TEXT_NODE) return node.nodeValue || '';
          if (node.nodeType !== Node.ELEMENT_NODE) return '';
          const tag = node.tagName.toLowerCase();
          const inline = () => [...node.childNodes].map(inlineHtmlToMarkdown).join('').trimEnd();
          if (tag === 'h1') return `# ${inline()}\n\n`;
          if (tag === 'h2') return `## ${inline()}\n\n`;
          if (tag === 'h3') return `### ${inline()}\n\n`;
          if (tag === 'p' || tag === 'div') {
            const value = inline();
            return value ? `${value}\n\n` : '\n';
          }
          if (tag === 'blockquote') return inline().split('\n').map((line) => `> ${line}`).join('\n') + '\n\n';
          if (tag === 'pre') return `\`\`\`\n${node.innerText.replace(/\n$/, '')}\n\`\`\`\n\n`;
          if (tag === 'hr') return '---\n\n';
          if (tag === 'ul' || tag === 'ol') {
            return [...node.children].map((li, index) => {
              const marker = tag === 'ol' ? `${index + 1}. ` : '- ';
              return `${'  '.repeat(depth)}${marker}${[...li.childNodes].map(inlineHtmlToMarkdown).join('').trim()}`;
            }).join('\n') + '\n\n';
          }
          return [...node.childNodes].map((child) => convertBlock(child, depth)).join('');
        };
        return [...editor.childNodes].map((node) => convertBlock(node)).join('').replace(/\n{4,}/g, '\n\n\n').trimEnd() + '\n';
      };

      const buildStandaloneHtml = () => `<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${escapeHtml(currentFileName.replace(/\.[^.]+$/, '') || '문서')}</title>
<style>
body{max-width:780px;margin:40px auto;padding:0 24px;color:#202124;font-family:"Malgun Gothic","맑은 고딕",Arial,sans-serif;font-size:16px;line-height:1.75;tab-size:4;word-break:break-word}
p,h1,h2,h3,blockquote,li,pre{white-space:pre-wrap}p{margin:0 0 1em}p.blank-line{min-height:1.75em;margin:0}h1{font-size:2em}h2{font-size:1.55em}h3{font-size:1.25em}blockquote{margin:1em 0;padding:.5em 1em;border-left:4px solid #94a3b8;background:#f8fafc;color:#475569}pre{overflow:auto;padding:14px 16px;border-radius:8px;background:#f4f5f7}code{font-family:Consolas,monospace}a{color:#1558d6}img{max-width:100%;height:auto}hr{border:0;border-top:1px solid #cdd2d9;margin:2em 0}
</style>

${sanitizeHtml(editor.innerHTML)}

      const downloadText = (content, fileName, mime) => {
        const blob = new Blob([content], { type: `${mime};charset=utf-8` });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = fileName;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };

      const suggestedName = (extension) => {
        const base = (currentFileName || '문서').replace(/\.(md|markdown|txt|html?|docx?)$/i, '') || '문서';
        return `${base}.${extension}`;
      };

      const xmlEscape = (value) => String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');

      const docxColorValue = (value) => {
        const color = String(value || '').trim();
        const shortHex = color.match(/^#([0-9a-f]{3})$/i);
        if (shortHex) return shortHex[1].split('').map((part) => part + part).join('').toUpperCase();
        const longHex = color.match(/^#([0-9a-f]{6})$/i);
        if (longHex) return longHex[1].toUpperCase();
        const rgb = color.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
        if (!rgb) return '';
        return rgb.slice(1, 4).map((part) => Math.max(0, Math.min(255, Number(part))).toString(16).padStart(2, '0')).join('').toUpperCase();
      };

      const docxStateForElement = (element, inherited = {}) => {
        const next = { ...inherited };
        const tag = element.tagName;
        if (['B', 'STRONG'].includes(tag)) next.bold = true;
        if (['I', 'EM'].includes(tag)) next.italic = true;
        if (tag === 'U') next.underline = true;
        if (['S', 'STRIKE', 'DEL'].includes(tag)) next.strike = true;
        if (tag === 'SUP') next.superscript = true;
        if (tag === 'SUB') next.subscript = true;
        if (tag === 'CODE') next.code = true;

        const weight = String(element.style?.fontWeight || '');
        if (weight === 'bold' || Number.parseInt(weight, 10) >= 600) next.bold = true;
        if (element.style?.fontStyle === 'italic') next.italic = true;
        const decoration = String(element.style?.textDecorationLine || element.style?.textDecoration || '');
        if (decoration.includes('underline')) next.underline = true;
        if (decoration.includes('line-through')) next.strike = true;
        const color = docxColorValue(element.style?.color);
        if (color) next.color = color;
        return next;

      const docxRunProperties = (state) => {
        const properties = [];
        if (state.bold) properties.push('<w:b/>');
        if (state.italic) properties.push('<w:i/>');
        if (state.underline) properties.push('<w:u w:val="single"/>');
        if (state.strike) properties.push('<w:strike/>');
        if (state.superscript) properties.push('<w:vertAlign w:val="superscript"/>');
        if (state.subscript) properties.push('<w:vertAlign w:val="subscript"/>');
        if (state.color) properties.push('<w:color w:val="' + state.color + '"/>');
        if (state.code) {
          properties.push('<w:rFonts w:ascii="Consolas" w:hAnsi="Consolas" w:eastAsia="Consolas"/>');
          properties.push('<w:sz w:val="21"/><w:szCs w:val="21"/>');
          properties.push('<w:shd w:val="clear" w:color="auto" w:fill="F3F4F6"/>');

        return properties.length ? '<w:rPr>' + properties.join('') + '</w:rPr>' : '';
      };

      const docxTextRuns = (text, state) => String(text || '')
        .replace(/\r\n?/g, '\n')
        .split(/(\n|\t)/)
        .map((part) => {
          if (part === '\n') return '<w:r><w:br/></w:r>';
          if (part === '\t') return '<w:r><w:tab/></w:r>';
          if (!part) return '';
          return '<w:r>' + docxRunProperties(state) + '<w:t xml:space="preserve">' + xmlEscape(part) + '</w:t></w:r>';

      const docxInlineNodes = (nodes, context, inherited = {}) => [...nodes].map((node) => {

        }
        if (node.tagName === 'A') {
          const href = String(node.getAttribute('href') || '').trim();
          const content = docxInlineNodes(node.childNodes, context, { ...state, color: '0563C1', underline: true });

          let relationshipId = context.hyperlinks.get(href);

            relationshipId = 'rId' + context.nextRelationshipId;
            context.nextRelationshipId += 1;

          return '<w:hyperlink r:id="' + relationshipId + '" w:history="1">' + content + '</w:hyperlink>';

      const docxParagraphXml = (element, context, options = {}) => {
        const styleId = options.styleId || 'Normal';

      const docxHorizontalRuleXml = () => '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="CBD5E1"/></w:pBdr><w:spacing w:before="120" w:after="120"/></w:pPr></w:p>';

      const docxTableWidths = (rows, columnCount) => {
        const weights = Array.from({ length: columnCount }, () => 10);
        rows.forEach((row) => {

            if (index < columnCount) weights[index] = Math.max(weights[index], Math.min(60, cell.innerText.trim().length || 1));

        });
        const minimum = Math.min(900, Math.floor(9360 / columnCount));
        const remaining = 9360 - (minimum * columnCount);
        const total = weights.reduce((sum, weight) => sum + weight, 0);
        const widths = weights.map((weight) => minimum + Math.floor(Math.max(0, remaining) * weight / total));

      const docxNumberingXml = () => {

        const localParts = [];
        const centralParts = [];
        let offset = 0;

        entries.forEach(([name, content]) => {

            zipU32(0x04034B50), zipU16(20), zipU16(0x0800), zipU16(0), zipU16(dosTime), zipU16(dosDate),
            zipU32(crc), zipU32(data.length), zipU32(data.length), zipU16(nameBytes.length), zipU16(0), nameBytes

            zipU32(0x02014B50), zipU16(20), zipU16(20), zipU16(0x0800), zipU16(0), zipU16(dosTime), zipU16(dosDate),

          (body || '<w:p/>') +

      const loadDocumentFile = async (file, handle = null) => {

          if (error?.name !== 'AbortError') showToast('파일을 열지 못했습니다.');
        }
      };

      const clipboardHtmlWithExplicitBreaks = (range) => {
        const container = document.createElement('div');
        container.appendChild(range.cloneContents());
        const clipboardBlockTags = new Set([
          'P', 'DIV', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'BLOCKQUOTE', 'PRE',
          'UL', 'OL', 'LI', 'TABLE', 'THEAD', 'TBODY', 'TFOOT', 'TR', 'TD', 'TH', 'HR'
        ]);
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
        const newlineNodes = [];
        while (walker.nextNode()) {
          if (/\r|\n/.test(walker.currentNode.nodeValue || '')) newlineNodes.push(walker.currentNode);
        }

        newlineNodes.forEach((node) => {
          const parts = String(node.nodeValue || '').replace(/\r\n?/g, '\n').split('\n');
          const fragment = document.createDocumentFragment();
          parts.forEach((part, index) => {
            if (part) fragment.appendChild(document.createTextNode(part));
            if (index < parts.length - 1) fragment.appendChild(document.createElement('br'));
          });
          node.replaceWith(fragment);
        });

        const wrapped = document.createDocumentFragment();
        let inlineRun = null;
        [...container.childNodes].forEach((node) => {
          const isBlock = node.nodeType === Node.ELEMENT_NODE && clipboardBlockTags.has(node.tagName);
          if (isBlock) {
            inlineRun = null;
            wrapped.appendChild(node);
            return;
          }
          if (!inlineRun) {
            inlineRun = document.createElement('div');
            wrapped.appendChild(inlineRun);
          }
          inlineRun.appendChild(node);
        });
        container.replaceChildren(wrapped);

        const breakParts = (element) => {
          const breaks = [...element.querySelectorAll('br')];
          if (!breaks.length) return [];
          const parts = [];
          let startContainer = element;
          let startOffset = 0;
          breaks.forEach((lineBreak) => {
            const partRange = document.createRange();
            partRange.setStart(startContainer, startOffset);
            partRange.setEndBefore(lineBreak);
            parts.push(partRange.cloneContents());
            startContainer = lineBreak.parentNode;
            startOffset = [...startContainer.childNodes].indexOf(lineBreak) + 1;
          });
          const lastRange = document.createRange();
          lastRange.setStart(startContainer, startOffset);
          lastRange.setEnd(element, element.childNodes.length);
          parts.push(lastRange.cloneContents());
          return parts;
        };

        const appendPart = (line, part) => {
          const hasContent = Boolean(part.textContent)
            || Boolean(part.querySelector?.('img,hr,table,iframe,video,audio,canvas,svg'));
          if (hasContent) line.appendChild(part);
          else line.appendChild(document.createTextNode('\u00A0'));
        };

        const splitCandidates = [...container.querySelectorAll('p,div,h1,h2,h3,h4,h5,h6,blockquote,pre')]
          .filter((element) => ![...element.children].some((child) => clipboardBlockTags.has(child.tagName)));
        splitCandidates.forEach((element) => {
          const parts = breakParts(element);
          if (!parts.length) return;
          const replacement = document.createDocumentFragment();
          if (!element.textContent && parts.every((part) => !part.textContent)) {
            const blankLine = document.createElement('div');
            blankLine.appendChild(document.createTextNode('\u00A0'));
            replacement.appendChild(blankLine);
          } else {
            parts.forEach((part) => {
              const lineTag = ['P', 'DIV'].includes(element.tagName) ? 'div' : element.tagName.toLowerCase();
              const line = document.createElement(lineTag);
              [...element.attributes].forEach((attribute) => line.setAttribute(attribute.name, attribute.value));
              appendPart(line, part);
              replacement.appendChild(line);
            });
          }
          element.replaceWith(replacement);
        });

        [...container.querySelectorAll('li,td,th')].forEach((element) => {
          if (element.querySelector('ul,ol,table')) return;
          const parts = breakParts(element);
          if (!parts.length) return;
          element.replaceChildren();
          parts.forEach((part) => {
            const line = document.createElement('div');
            appendPart(line, part);
            element.appendChild(line);
          });
        });

        return sanitizeHtml(container.innerHTML);
      };

      const handleEditorCopy = (event) => {
        const selection = window.getSelection();
        if (!event.clipboardData || !selection || selection.isCollapsed || !selectionIsInsideEditor()) return;
        const range = selection.getRangeAt(0);
        const coversWholeEditor = range.startContainer === editor
          && range.startOffset === 0
          && range.endContainer === editor
          && range.endOffset === editor.childNodes.length;
        const plain = coversWholeEditor ? editor.innerText : selection.toString();
        const html = clipboardHtmlWithExplicitBreaks(range);

        event.preventDefault();
        event.clipboardData.setData('text/plain', String(plain).replace(/\r\n?/g, '\n'));
        event.clipboardData.setData('text/html', html);
      };

      const copyAllRich = () => {
        focusEditor();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(editor);
        selection.removeAllRanges();
        selection.addRange(range);
        const success = document.execCommand('copy');
        selection.removeAllRanges();
        showToast(success ? '문서 전체를 서식 있게 복사했습니다.' : '복사하지 못했습니다. 편집 영역에서 Ctrl+A, Ctrl+C를 사용하세요.');
      };

      const openFindbar = (withReplace) => {
        hideSelectionToolbar();
        const selection = window.getSelection();
        const selectedText = withReplace
          && selection
          && !selection.isCollapsed
          && selectionIsInsideEditor()
            ? selection.toString()
            : '';

        if (selectedText) {
          savedRange = selection.getRangeAt(0).cloneRange();
          findText.value = selectedText;
        }
        if (withReplace) syncReplacementFormatButtonsFromSelection();
        findbar.classList.add('open');
        replaceRow.style.display = withReplace ? 'grid' : 'none';
        replaceFormats.style.display = withReplace ? 'flex' : 'none';
        replaceFormatHint.style.display = withReplace ? 'block' : 'none';
        findText.focus();
        findText.select();
      };

      const closeFindbar = () => {
        findbar.classList.remove('open');
        focusEditor();
      };

      const SPECIAL_PARAGRAPH = '\uE000';
      const SPECIAL_LINE_BREAK = '\uE001';

      const parseSpecialCodes = (source) => {
        const tokens = [];
        let text = '';
        let buffer = '';
        let usesCodes = false;

        const flushText = () => {
          if (!buffer) return;
          tokens.push({ type: 'text', value: buffer });
          text += buffer;
          buffer = '';
        };

        for (let index = 0; index < source.length; index += 1) {
          const character = source[index];
          const code = source[index + 1]?.toLowerCase();
          if (character !== '^' || !['^', 'p', 'l', 't'].includes(code)) {
            buffer += character;
            continue;
          }

          usesCodes = true;
          index += 1;
          if (code === '^') {
            buffer += '^';
          } else {
            flushText();
            if (code === 'p') {
              tokens.push({ type: 'paragraph' });
              text += SPECIAL_PARAGRAPH;
            } else if (code === 'l') {
              tokens.push({ type: 'line' });
              text += SPECIAL_LINE_BREAK;
            } else {
              tokens.push({ type: 'tab' });
              text += '\t';
            }
          }
        }
        flushText();
        return { text, tokens, usesCodes };
      };

      const getParagraphUnits = () => {
        const units = [];
        [...editor.childNodes].forEach((node) => {
          if (node.nodeType === Node.ELEMENT_NODE && ['UL', 'OL'].includes(node.tagName)) {
            [...node.children].filter((child) => child.tagName === 'LI').forEach((item) => units.push(item));
          } else if (node.nodeType === Node.ELEMENT_NODE || (node.nodeType === Node.TEXT_NODE && node.nodeValue)) {
            units.push(node);
          }
        });
        return units;
      };

      const getNodePoint = (node, atEnd) => {
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(!atEnd);
        return {
          node: range.startContainer,
          offset: range.startOffset
        };
      };

      const buildSpecialSearchModel = () => {
        const units = getParagraphUnits();
        const items = [];

        const addTextNode = (node) => {
          for (let offset = 0; offset < node.nodeValue.length; offset += 1) {
            const character = node.nodeValue[offset] === '\n' ? SPECIAL_LINE_BREAK : node.nodeValue[offset];
            items.push({
              character,
              start: { node, offset },
              end: { node, offset: offset + 1 }
            });
          }
        };

        const addElement = (node, placeholderBreak) => {
          if (node.nodeType === Node.TEXT_NODE) {
            addTextNode(node);
            return;
          }
          if (node.nodeType !== Node.ELEMENT_NODE) return;
          if (node.tagName === 'BR') {
            if (placeholderBreak === node) return;
            const siblings = [...node.parentNode.childNodes];
            const offset = siblings.indexOf(node);
            items.push({
              character: SPECIAL_LINE_BREAK,
              start: { node: node.parentNode, offset },
              end: { node: node.parentNode, offset: offset + 1 }
            });
            return;
          }
          [...node.childNodes].forEach((child) => addElement(child, placeholderBreak));
        };

        units.forEach((unit, index) => {
          const placeholderBreak = unit.nodeType === Node.ELEMENT_NODE
            && !unit.textContent
            && unit.childNodes.length === 1
            && unit.firstElementChild?.tagName === 'BR'
            ? unit.firstElementChild
            : null;
          addElement(unit, placeholderBreak);

          if (index < units.length - 1) {
            items.push({
              character: SPECIAL_PARAGRAPH,
              start: getNodePoint(unit, true),
              end: getNodePoint(units[index + 1], false)
            });
          }
        });

        return {
          text: items.map((item) => item.character).join(''),
          items
        };
      };

      const createRangeFromModel = (model, index, length) => {
        if (index < 0 || length < 1 || index + length > model.items.length) return null;
        const first = model.items[index];
        const last = model.items[index + length - 1];
        const range = document.createRange();
        range.setStart(first.start.node, first.start.offset);
        range.setEnd(last.end.node, last.end.offset);
        return range;
      };

      const selectEditorRange = (range) => {
        focusEditor();
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      };

      const findNextSpecial = (parsedQuery) => {
        if (!parsedQuery.text) return false;
        const model = buildSpecialSearchModel();
        const sameQuery = specialSearchState.query === parsedQuery.text;
        const startIndex = sameQuery ? specialSearchState.nextIndex : 0;
        let index = model.text.indexOf(parsedQuery.text, startIndex);
        if (index < 0 && startIndex > 0) index = model.text.indexOf(parsedQuery.text);
        if (index < 0) return false;

        const range = createRangeFromModel(model, index, parsedQuery.text.length);
        if (!range) return false;
        selectEditorRange(range);
        specialSearchState = {
          query: parsedQuery.text,
          nextIndex: index + Math.max(1, parsedQuery.text.length),
          index,
          range: range.cloneRange()
        };
        return true;
      };

      const findNext = () => {
        const query = findText.value;
        if (!query) return false;
        const parsedQuery = parseSpecialCodes(query);
        if (parsedQuery.usesCodes) return findNextSpecial(parsedQuery);

        specialSearchState = { query: '', nextIndex: 0, index: -1, range: null };
        focusEditor();
        const found = window.find(query, false, false, true, false, false, false);
        if (!found) {
          const range = document.createRange();
          range.setStart(editor, 0);
          range.collapse(true);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
          return window.find(query, false, false, true, false, false, false);
        }
        return true;
      };

      const particlePairs = [
        { consonant: '으로부터', vowel: '로부터', rieul: '로부터' },
        { consonant: '으로써', vowel: '로써', rieul: '로써' },
        { consonant: '으로서', vowel: '로서', rieul: '로서' },
        { consonant: '이에요', vowel: '예요' },
        { consonant: '이랑', vowel: '랑' },
        { consonant: '이나', vowel: '나' },
        { consonant: '으로', vowel: '로', rieul: '로' },
        { consonant: '은', vowel: '는' },
        { consonant: '이', vowel: '가' },
        { consonant: '을', vowel: '를' },
        { consonant: '과', vowel: '와' }
      ];

      const getHangulEnding = (value) => {
        const lastCharacter = String(value).slice(-1);
        if (!lastCharacter) return null;
        const code = lastCharacter.charCodeAt(0);
        if (code < 0xAC00 || code > 0xD7A3) return null;
        const finalIndex = (code - 0xAC00) % 28;
        return {
          hasFinal: finalIndex !== 0,
          isRieul: finalIndex === 8
        };
      };

      const isParticleBoundary = (character) => !character || !/[\p{L}\p{N}]/u.test(character);

      const getParticleAdjustment = (suffix, replacement) => {
        const ending = getHangulEnding(replacement);
        if (!ending) return null;

        for (const pair of particlePairs) {
          const desired = ending.hasFinal
            ? (ending.isRieul && pair.rieul ? pair.rieul : pair.consonant)
            : pair.vowel;
          const currentForms = [...new Set([pair.consonant, pair.vowel, pair.rieul].filter(Boolean))]
            .sort((left, right) => right.length - left.length);
          for (const current of currentForms) {
            if (suffix.startsWith(current) && isParticleBoundary(suffix[current.length])) {
              return { current, desired };
            }
          }
        }
        return null;
      };

      const replaceLiteralText = (source, query, replacement, withParticles) => {
        let cursor = 0;
        let count = 0;
        let particleCount = 0;
        let output = '';

        while (cursor <= source.length) {
          const matchIndex = source.indexOf(query, cursor);
          if (matchIndex < 0) {
            output += source.slice(cursor);
            break;
          }

          output += source.slice(cursor, matchIndex) + replacement;
          cursor = matchIndex + query.length;
          count += 1;

          if (withParticles) {
            const adjustment = getParticleAdjustment(source.slice(cursor), replacement);
            if (adjustment && adjustment.current !== adjustment.desired) {
              output += adjustment.desired;
              cursor += adjustment.current.length;
              particleCount += 1;
            }
          }
        }

        return { value: output, count, particleCount };
      };

      const getLiteralReplacementOperations = (source, query, replacement, withParticles) => {
        const operations = [];
        let cursor = 0;
        let particleCount = 0;

        while (cursor <= source.length) {
          const start = source.indexOf(query, cursor);
          if (start < 0) break;
          let end = start + query.length;
          let insertion = replacement;

          if (withParticles) {
            const adjustment = getParticleAdjustment(source.slice(end), replacement);
            if (adjustment && adjustment.current !== adjustment.desired) {
              end += adjustment.current.length;
              insertion += adjustment.desired;
              particleCount += 1;
            }
          }

          operations.push({ start, end, insertion });
          cursor = end;
        }

        return { operations, particleCount };
      };

      const replaceRangeWithSpecialTokens = (range, tokens, settings = { apply: [], remove: [] }) => {
        selectEditorRange(range);
        if (!range.collapsed) {
          const deleted = document.execCommand('delete', false, null);
          if (!deleted) {
            range.deleteContents();
            range.collapse(true);
            selectEditorRange(range);
          }
        }

        tokens.forEach((token) => {
          if (token.type === 'text' && token.value) {
            insertReplacementText(token.value, settings);
          } else if (token.type === 'tab') {
            insertReplacementText('\t', settings);
          } else if (token.type === 'line') {
            const inserted = document.execCommand('insertLineBreak', false, null);
            if (!inserted) document.execCommand('insertHTML', false, '<br>');
          } else if (token.type === 'paragraph') {
            document.execCommand('insertParagraph', false, null);
          }
        });
        normalizeEmptyDocument();
        saveSelection();
      };

      const normalizeClipboardText = (value) => String(value).replace(/\r\n?/g, '\n');

      const plainTextToSpecialTokens = (source) => {
        const tokens = [];
        let buffer = '';
        const flushText = () => {
          if (!buffer) return;
          tokens.push({ type: 'text', value: buffer });
          buffer = '';
        };

        for (const character of normalizeClipboardText(source)) {
          if (character === '\n') {
            flushText();
            tokens.push({ type: 'line' });
          } else if (character === '\t') {
            flushText();
            tokens.push({ type: 'tab' });
          } else {
            buffer += character;
          }
        }
        flushText();
        return tokens;
      };

      const insertPlainTextPreservingBreaks = (text) => {
        const selection = window.getSelection();
        let range = null;
        if (selection && selection.rangeCount && selectionIsInsideEditor()) {
          range = selection.getRangeAt(0).cloneRange();
        } else {
          range = document.createRange();
          range.selectNodeContents(editor);
          range.collapse(false);
        }
        replaceRangeWithSpecialTokens(range, plainTextToSpecialTokens(text));
        updateCount();
      };

      const replaceAllSpecial = (parsedQuery, parsedReplacement, settings, formattingOnly) => {
        if (!parsedQuery.text) return 0;
        let beforeIndex = Number.POSITIVE_INFINITY;
        let count = 0;

        while (count < 10000) {
          const model = buildSpecialSearchModel();
          const searchable = model.text.slice(0, beforeIndex);
          const index = searchable.lastIndexOf(parsedQuery.text);
          if (index < 0) break;
          const range = createRangeFromModel(model, index, parsedQuery.text.length);
          if (!range) break;
          if (formattingOnly) {
            applyFormattingToRange(range, settings);
          } else {
            replaceRangeWithSpecialTokens(range, parsedReplacement.tokens, settings);
          }
          beforeIndex = index;
          count += 1;
        }
        specialSearchState = { query: '', nextIndex: 0, index: -1, range: null };
        return count;
      };

      const replaceCurrent = () => {
        const selection = window.getSelection();
        const parsedQuery = parseSpecialCodes(findText.value);
        const parsedReplacement = parseSpecialCodes(replaceText.value);
        const settings = getReplacementFormatSettings();
        const formattingOnly = !replaceText.value && hasReplacementFormatSettings(settings);
        const usesSpecialCodes = parsedQuery.usesCodes || parsedReplacement.usesCodes;
        let particleCount = 0;
        let replaced = false;

        if (usesSpecialCodes) {
          let range = null;
          let matchIndex = -1;
          if (parsedQuery.usesCodes
            && specialSearchState.query === parsedQuery.text
            && specialSearchState.range) {
            range = specialSearchState.range.cloneRange();
            matchIndex = specialSearchState.index;
          } else if (!parsedQuery.usesCodes
            && selection
            && selection.rangeCount
            && selection.toString() === parsedQuery.text
            && selectionIsInsideEditor()) {
            range = selection.getRangeAt(0).cloneRange();
          }

          if (range) {
            if (formattingOnly) {
              applyFormattingToRange(range, settings);
            } else {
              replaceRangeWithSpecialTokens(range, parsedReplacement.tokens, settings);
            }
            replaced = true;
            if (parsedQuery.usesCodes) {
              specialSearchState = {
                query: parsedQuery.text,
                nextIndex: Math.max(0, matchIndex + parsedReplacement.text.length),
                index: -1,
                range: null
              };
            }
            updateCount();
          }
          findNext();
          if (replaced) showToast('특수기호를 포함해 바꿨습니다.');
          return;
        }

        if (selection && selection.toString() === findText.value && selectionIsInsideEditor()) {
          if (formattingOnly) {
            applyFormattingToRange(selection.getRangeAt(0).cloneRange(), settings);
            updateCount();
            replaced = true;
            findNext();
            showToast('글자는 유지하고 선택한 서식만 변경했습니다.');
            return;
          }

          let insertion = replaceText.value;
          if (adjustParticles.checked && selection.rangeCount) {
            const range = selection.getRangeAt(0);
            const endNode = range.endContainer;
            if (endNode.nodeType === Node.TEXT_NODE) {
              const suffix = endNode.nodeValue.slice(range.endOffset);
              const adjustment = getParticleAdjustment(suffix, replaceText.value);
              if (adjustment && adjustment.current !== adjustment.desired) {
                range.setEnd(endNode, range.endOffset + adjustment.current.length);
                selection.removeAllRanges();
                selection.addRange(range);
                insertion += adjustment.desired;
                particleCount = 1;
              }
            }
          }
          const range = selection.getRangeAt(0).cloneRange();
          replaceRangeWithSpecialTokens(range, [{ type: 'text', value: insertion }], settings);
          updateCount();
          replaced = true;
        }
        findNext();
        if (replaced && particleCount) showToast('단어와 조사를 받침에 맞게 바꿨습니다.');
      };

      const replaceAll = () => {
        const query = findText.value;
        const settings = getReplacementFormatSettings();
        if (!query) {
          const count = applyFormatSettingsToDocument(settings);
          showToast(`문서 전체의 서식을 버튼 상태대로 변경했습니다 · 요소 ${count}개 정리.`);
          return;
        }
        const parsedQuery = parseSpecialCodes(query);
        const parsedReplacement = parseSpecialCodes(replaceText.value);
        const formattingOnly = !replaceText.value && hasReplacementFormatSettings(settings);
        if (parsedQuery.usesCodes || parsedReplacement.usesCodes) {
          const count = replaceAllSpecial(parsedQuery, parsedReplacement, settings, formattingOnly);
          updateCount();
          showToast(formattingOnly
            ? `${count}개 항목의 서식을 변경했습니다.`
            : `${count}개 항목을 특수기호 규칙으로 바꿨습니다.`);
          return;
        }

        let count = 0;
        let particleCount = 0;
        const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        if (hasReplacementFormatSettings(settings)) {
          nodes.reverse().forEach((node) => {
            const replacement = formattingOnly ? query : replaceText.value;
            const result = getLiteralReplacementOperations(node.nodeValue, query, replacement, !formattingOnly && adjustParticles.checked);
            particleCount += result.particleCount;
            count += result.operations.length;
            result.operations.reverse().forEach((operation) => {
              const range = document.createRange();
              range.setStart(node, operation.start);
              range.setEnd(node, operation.end);
              if (formattingOnly) {
                applyFormattingToRange(range, settings);
              } else {
                replaceRangeWithSpecialTokens(range, [{ type: 'text', value: operation.insertion }], settings);
              }
            });
          });
        } else {
          nodes.forEach((node) => {
            const result = replaceLiteralText(node.nodeValue, query, replaceText.value, adjustParticles.checked);
            if (result.count) {
              count += result.count;
              particleCount += result.particleCount;
              node.nodeValue = result.value;
            }
          });
        }
        updateCount();
        const particleMessage = particleCount ? ` · 조사 ${particleCount}개 자동 교정` : '';
        showToast(formattingOnly
          ? `${count}개 항목의 서식을 변경했습니다.`
          : `${count}개 항목을 바꿨습니다${particleMessage}.`);
      };

      document.querySelectorAll('[data-command]').forEach((button) => {
        button.addEventListener('mousedown', (event) => event.preventDefault());
        button.addEventListener('click', () => runCommand(button.dataset.command));
      });

      replaceFormatButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const isActive = button.getAttribute('aria-pressed') === 'true';
          button.setAttribute('aria-pressed', String(!isActive));
        });
      });

      selectionCommandButtons.forEach((button) => {
        button.addEventListener('mousedown', (event) => event.preventDefault());
        button.addEventListener('click', () => {
          restoreSelection();
          runCommand(button.dataset.selectionCommand);
          saveSelection();
          showSelectionToolbar();
        });
      });

      document.querySelectorAll('[data-action]').forEach((button) => {
        button.addEventListener('mousedown', () => saveSelection());
        button.addEventListener('click', async () => {
          const action = button.dataset.action;
          if (action === 'new') {
            if (editor.innerText.trim() && !window.confirm('현재 문서를 지우고 새 문서를 만들까요?')) return;
            normalizeEmptyDocument(true);
            currentFileName = '새 문서';
            currentHtmlFileHandle = null;
            currentMarkdownFileHandle = null;
            currentDocxFileHandle = null;
            updateCount();
            focusEditor();
          } else if (action === 'open') {
            await openDocument();
          } else if (action === 'save-html') {
            await saveHtmlDocument();
          } else if (action === 'save-md') {
            await saveMarkdownDocument();
          } else if (action === 'save-docx') {
            await saveDocxDocument();
          } else if (action === 'copy-all') {
            copyAllRich();
          } else if (action === 'print') {
            window.print();
          } else if (action === 'link') {
            insertLink();
          } else if (action === 'clear-format') {
            clearFormatting();
          } else if (action === 'find') {
            openFindbar(false);
          } else if (action === 'replace') {
            openFindbar(true);
          }
        });
      });

      blockFormat.addEventListener('change', () => {
        runCommand('formatBlock', blockFormat.value);
      });

      fileInput.addEventListener('change', async () => {
        const file = fileInput.files?.[0];
        if (!file) return;
        try {
          await loadDocumentFile(file);
        } catch (error) {
          showToast('파일을 열지 못했습니다.');
        } finally {
          fileInput.value = '';
        }
      });

      editor.addEventListener('input', () => {
        hideSelectionToolbar();
        normalizeEmptyDocument();
        updateCount();
        updateFormattingControlsState();
      });
      editor.addEventListener('mouseup', () => {
        saveSelection();
        updateFormattingControlsState();
        setTimeout(showSelectionToolbar, 0);
      });
      editor.addEventListener('keyup', () => {
        saveSelection();
        updateFormattingControlsState();
        showSelectionToolbar();
      });
      document.addEventListener('selectionchange', () => {
        updateFormattingControlsState();
        if (selectionToolbar.classList.contains('visible')) showSelectionToolbar();
      });
      document.addEventListener('mousedown', (event) => {
        if (!selectionToolbar.contains(event.target)) hideSelectionToolbar();
      });

      editor.addEventListener('mouseover', (event) => {
        const anchor = event.target.closest?.('a');
        if (anchor && editor.contains(anchor) && anchor !== hoveredLink) showLinkPreview(anchor);
      });

      editor.addEventListener('mouseout', (event) => {
        const anchor = event.target.closest?.('a');
        if (!anchor) return;
        const next = event.relatedTarget;
        if (!next || (!anchor.contains(next) && !linkPreview.contains(next))) hideLinkPreview();
      });

      linkPreview.addEventListener('mouseleave', (event) => {
        const next = event.relatedTarget;
        if (hoveredLink && next && (next === hoveredLink || hoveredLink.contains(next))) return;
        hideLinkPreview();
      });
      linkPreviewCopy.addEventListener('click', copyPreviewUrl);

      editor.addEventListener('scroll', () => {
        hideLinkPreview();
        hideSelectionToolbar();
      });
      window.addEventListener('scroll', () => {
        hideLinkPreview();
        hideSelectionToolbar();
      }, true);
      window.addEventListener('resize', () => {
        hideLinkPreview();
        hideSelectionToolbar();
      });
      document.addEventListener('copy', handleEditorCopy);

      editor.addEventListener('click', (event) => {
        const anchor = event.target.closest?.('a');
        if (!anchor || !editor.contains(anchor)) return;
        if (event.ctrlKey || event.metaKey) {
          event.preventDefault();
          window.open(anchor.href, '_blank', 'noopener,noreferrer');
          hideLinkPreview();
        }
      });

      editor.addEventListener('paste', (event) => {
        const selection = window.getSelection();
        const plain = event.clipboardData?.getData('text/plain') || '';
        const explicitPlainPaste = pastePlainRequested;
        const linkCandidate = plain.trim();
        pastePlainRequested = false;

        if (!explicitPlainPaste
          && selection
          && !selection.isCollapsed
          && isUrl(linkCandidate)
          && selectionIsInsideEditor()) {
          event.preventDefault();
          document.execCommand('createLink', false, linkCandidate);
          updateCount();
          return;
        }

        event.preventDefault();
        if (!plain) {
          showToast('붙여넣을 일반 텍스트를 찾지 못했습니다.');
          return;
        }
        insertPlainTextPreservingBreaks(plain);
      });

      document.querySelectorAll('[data-find]').forEach((button) => {
        button.addEventListener('click', () => {
          const action = button.dataset.find;
          if (action === 'close') closeFindbar();
          if (action === 'next') findNext();
          if (action === 'replace') replaceCurrent();
          if (action === 'replace-all') replaceAll();
        });
      });

      findText.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          findNext();
        }
        if (event.key === 'Escape') closeFindbar();
      });

      replaceText.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          replaceCurrent();
        }
        if (event.key === 'Escape') closeFindbar();
      });

      document.addEventListener('keydown', async (event) => {
        const ctrl = event.ctrlKey || event.metaKey;
        const key = event.key.toLowerCase();
        if (ctrl && event.shiftKey && key === 'v') pastePlainRequested = true;
        if (!ctrl) return;
        if (key === 'k') {
          event.preventDefault();
          saveSelection();
          insertLink();
        } else if (key === 'h') {
          event.preventDefault();
          openFindbar(true);
        } else if (key === 'f') {
          event.preventDefault();
          openFindbar(false);
        } else if (key === 's' && !event.shiftKey) {
          event.preventDefault();
          await saveHtmlDocument();
        }
      });

      document.addEventListener('keyup', (event) => {
        if (event.key.toLowerCase() === 'v') pastePlainRequested = false;
      });
      window.addEventListener('blur', () => { pastePlainRequested = false; });

      updateCount();
      updateFormattingControlsState();
    })();
  </script>
</body>
</html>
